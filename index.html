<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Chronologizer - Timeline Visualizer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Chronologizer</h1>
            <p>Visualize time intervals from years to millennia</p>
        </header>

        <div class="title-section">
            <div class="input-group">
                <label for="chronology-title-input">Title:</label>
                <input type="text" id="chronology-title-input" placeholder="World War II" maxlength="256">
            </div>
        </div>

        <div class="input-section">
            <div id="input-rows"></div>
            <div class="action-buttons">
                <button id="chronologize">Chronologize</button>
                <button id="clear-all">Clear All</button>
            </div>
        </div>

        <div class="timeline-container">
            <h2 id="chronology-title" class="chronology-title" hidden></h2>
            <svg id="timeline-svg" width="100%" height="100"></svg>
        </div>
    </div>

    <script src="timeline.js"></script>
</body>
</html>
